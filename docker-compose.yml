version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: devops_autopilot_db
    environment:
      POSTGRES_DB: devops_autopilot
      POSTGRES_USER: autopilot
      POSTGRES_PASSWORD: autopilot123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autopilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped  

  redis:
    image: redis:7-alpine
    container_name: devops_autopilot_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: